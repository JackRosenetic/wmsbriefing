name: Daily WMS Briefing

on:
  schedule:
    - cron: '45 6 * * *'  # 6:45am UTC = 7:45am BST (UK summer time)
  workflow_dispatch:       # Allows you to run it manually too

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run briefing
        env:
          WMS_PASSWORD: ${{ secrets.WMS_PASSWORD }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: node .github/workflows/briefing.js
